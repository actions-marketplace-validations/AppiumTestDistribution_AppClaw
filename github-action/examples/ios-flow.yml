name: AppClaw — iOS Flow

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: appclaw-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: iOS Simulator YAML Flow
    runs-on: macos-14 # iOS simulator requires macOS (Apple Silicon)

    steps:
      - uses: actions/checkout@v4

      - uses: AppiumTestDistribution/AppClaw@v1
        with:
          flow: flows/ios-smoke.yaml
          platform: ios
          ios-simulator-name: 'iPhone 16' # optional: defaults to iPhone 16
          ios-simulator-os: '18.4' # optional: defaults to latest
          provider: gemini
          api-key: ${{ secrets.LLM_API_KEY }}
